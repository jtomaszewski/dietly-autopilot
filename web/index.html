<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dietly-autopilot</title>
    <style>
      :root { --bg:#0f1115; --card:#171a21; --line:#262b36; --fg:#e6e8ee; --muted:#8b93a7;
              --accent:#7dd3a0; --warn:#e0b252; --change:#5aa9ff; }
      * { box-sizing: border-box; }
      body { margin:0; font:14px/1.5 system-ui, sans-serif; background:var(--bg); color:var(--fg); }
      header { padding:16px 20px; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
      h1 { font-size:18px; margin:0; }
      .muted { color:var(--muted); }
      main { padding:20px; max-width:1000px; margin:0 auto; }
      button { background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:7px; padding:8px 14px; cursor:pointer; font:inherit; }
      button:hover:not(:disabled) { border-color:var(--accent); }
      button.primary { background:var(--accent); color:#06210f; border-color:var(--accent); font-weight:600; }
      button:disabled { opacity:.5; cursor:default; }
      input[type=number] { width:64px; background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:7px; font:inherit; }
      select { background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:6px; font:inherit; max-width:100%; }
      .order-h { margin:24px 0 6px; font-size:15px; color:var(--muted); }
      .day { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin:12px 0; }
      .day h3 { margin:0 0 10px; font-size:15px; display:flex; gap:10px; align-items:baseline; }
      .badge { font-size:11px; padding:2px 8px; border-radius:20px; border:1px solid var(--line); color:var(--muted); }
      .badge.change { color:var(--change); border-color:var(--change); }
      .slot { padding:9px 0; border-top:1px solid var(--line); display:grid; grid-template-columns:120px 1fr; gap:12px; align-items:start; }
      .slot:first-of-type { border-top:none; }
      .slot .name { color:var(--muted); padding-top:6px; }
      .slot.willchange .name { color:var(--change); }
      .reason { color:var(--muted); font-size:12.5px; margin-top:4px; }
      .reason.ai::before { content:"🤖 "; }
      .locked { color:var(--muted); padding-top:6px; }
      .pill { font-size:11px; color:var(--warn); margin-left:6px; }
      #bar { position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--line); padding:12px 20px; display:flex; gap:14px; align-items:center; margin-top:20px; }
      details { margin:10px 0 0; }
      summary { cursor:pointer; color:var(--muted); }
      textarea { width:100%; height:280px; margin-top:8px; background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:10px; font:13px ui-monospace, monospace; }
      .results { margin-top:10px; }
      .ok { color:var(--accent); } .err { color:#ff7b72; }
      .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <header>
      <h1>🥗 dietly-autopilot</h1>
      <span class="muted" id="modelInfo"></span>
      <span style="flex:1"></span>
      <label class="muted">days <input type="number" id="days" value="14" min="1" max="40" /></label>
      <button id="loadBtn" class="primary">Load plan</button>
      <span id="status" class="muted"></span>
    </header>

    <main>
      <details id="guidelinesBox">
        <summary>Guidelines (what the model optimizes for) — click to view / edit</summary>
        <textarea id="guidelines" spellcheck="false"></textarea>
        <button id="saveGuidelines">Save guidelines</button>
        <span id="guidelinesStatus" class="muted"></span>
      </details>

      <div id="plan"></div>
    </main>

    <div id="bar">
      <button id="applyBtn" class="primary" disabled>Apply changes</button>
      <span id="pending" class="muted">No plan loaded.</span>
      <span id="applyStatus"></span>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const fmtKcal = (k) => (k != null ? ` (${k} kcal)` : '');
      let plan = null;

      async function api(path, opts) {
        const res = await fetch(path, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        return data;
      }

      // ---- guidelines ----
      $('guidelinesBox').addEventListener('toggle', async (e) => {
        if (e.target.open && !$('guidelines').value) {
          $('guidelines').value = (await api('/api/guidelines')).text;
        }
      });
      $('saveGuidelines').onclick = async () => {
        $('guidelinesStatus').textContent = 'saving…';
        await api('/api/guidelines', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: $('guidelines').value }) });
        $('guidelinesStatus').textContent = 'saved ✓ — reload the plan to re-run the model';
      };

      // ---- plan ----
      $('loadBtn').onclick = loadPlan;
      async function loadPlan() {
        $('loadBtn').disabled = true;
        $('status').innerHTML = '<span class="spinner"></span> asking the model (this takes ~1 min)…';
        $('plan').innerHTML = '';
        try {
          plan = await api('/api/plan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ days: Number($('days').value) }) });
          render();
          $('status').textContent = '';
        } catch (e) {
          $('status').innerHTML = '<span class="err">' + e.message + '</span>';
        } finally {
          $('loadBtn').disabled = false;
        }
      }

      function render() {
        const root = $('plan');
        root.innerHTML = '';
        if (!plan.orders.length) { root.textContent = 'No active orders.'; return; }
        for (const order of plan.orders) {
          const h = document.createElement('div');
          h.className = 'order-h';
          h.textContent = `Order #${order.orderId} — ${order.dietName}, ${order.dietCalories} kcal`;
          root.appendChild(h);

          for (const day of plan.days.filter((d) => d.orderId === order.orderId)) {
            root.appendChild(renderDay(day));
          }
          const u = plan.unpublished[order.orderId] || 0;
          if (u) {
            const n = document.createElement('div');
            n.className = 'muted'; n.style.margin = '4px 0 0 2px';
            n.textContent = `+${u} day(s) ahead not published yet`;
            root.appendChild(n);
          }
        }
        updatePending();
      }

      function renderDay(day) {
        const el = document.createElement('div');
        el.className = 'day';
        const willChange = day.slots.filter((s) => s.editable && s.suggestedId !== s.currentId).length;
        el.innerHTML = `<h3>${day.date}
          ${day.editable ? `<span class="badge ${willChange ? 'change' : ''}">${willChange ? willChange + ' suggested change(s)' : 'no changes'}</span>` : '<span class="badge">🔒 locked</span>'}
        </h3>`;

        for (const s of day.slots) {
          const row = document.createElement('div');
          row.className = 'slot';
          if (!s.editable) {
            row.innerHTML = `<div class="name">${s.slot}</div><div class="locked">${s.currentName}${fmtKcal(s.currentKcal)} <span class="pill">locked</span></div>`;
            el.appendChild(row);
            continue;
          }
          const sel = document.createElement('select');
          sel.dataset.order = day.orderId;
          sel.dataset.delivery = day.deliveryId;
          sel.dataset.mealid = s.deliveryMealId;
          sel.dataset.current = s.currentId;
          for (const o of s.options) {
            const opt = document.createElement('option');
            opt.value = o.id;
            const tags = [];
            if (o.id === s.currentId) tags.push('current');
            if (o.id === s.suggestedId && s.suggestedId !== s.currentId) tags.push('🤖 suggested');
            opt.textContent = `${o.variant ? '[' + o.variant + '] ' : ''}${o.name}${fmtKcal(o.kcal)}${tags.length ? '  — ' + tags.join(', ') : ''}`;
            if (o.id === s.suggestedId) opt.selected = true;
            sel.appendChild(opt);
          }
          sel.onchange = () => { markRow(row, sel); updatePending(); };
          const cell = document.createElement('div');
          cell.appendChild(sel);
          if (s.reason && (s.willChange || s.reason !== 'keep')) {
            const r = document.createElement('div');
            r.className = 'reason ai';
            r.textContent = s.reason;
            cell.appendChild(r);
          }
          row.innerHTML = `<div class="name">${s.slot}</div>`;
          row.appendChild(cell);
          markRow(row, sel);
          el.appendChild(row);
        }
        return el;
      }

      function markRow(row, sel) {
        row.classList.toggle('willchange', sel.value !== sel.dataset.current);
      }

      function collectSwaps() {
        return [...document.querySelectorAll('#plan select')]
          .filter((s) => s.value !== s.dataset.current)
          .map((s) => ({
            orderId: Number(s.dataset.order),
            deliveryId: Number(s.dataset.delivery),
            deliveryMealId: Number(s.dataset.mealid),
            dietCaloriesMealId: Number(s.value),
            label: s.options[s.selectedIndex].textContent,
          }));
      }

      function updatePending() {
        const n = collectSwaps().length;
        $('pending').textContent = n ? `${n} change(s) selected` : 'No changes selected.';
        $('applyBtn').disabled = n === 0;
      }

      // ---- apply ----
      $('applyBtn').onclick = async () => {
        const swaps = collectSwaps();
        if (!confirm(`Apply ${swaps.length} change(s) to your Dietly order?`)) return;
        $('applyBtn').disabled = true;
        $('applyStatus').innerHTML = '<span class="spinner"></span> applying…';
        try {
          const { results } = await api('/api/apply', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ swaps }) });
          const ok = results.filter((r) => r.ok).length;
          $('applyStatus').innerHTML = `<span class="${ok === results.length ? 'ok' : 'err'}">applied ${ok}/${results.length}</span>`;
          await loadPlan(); // refresh to reflect new state
        } catch (e) {
          $('applyStatus').innerHTML = '<span class="err">' + e.message + '</span>';
          $('applyBtn').disabled = false;
        }
      };

      // init
      api('/api/config').then((c) => { $('modelInfo').textContent = `model: ${c.model} · ${c.companyId}`; $('days').value = c.horizonDays; });
    </script>
  </body>
</html>
